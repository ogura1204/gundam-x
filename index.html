<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS COCKPIT UI - G-CON SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-cyan: #00f3ff;
            --ui-red: #ff003c;
            --ui-orange: #ffaa00;
            --bg-dark: #030508;
            --panel-bg: rgba(10, 15, 20, 0.85);
        }

        /* ページ全体の固定化（スクロール完全禁止） */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        
        body {
            width: 100vw; height: 100vh;
            background-color: #000;
            overflow: hidden; /* スクロールなし */
            font-family: 'Share Tech Mono', monospace;
            color: var(--ui-cyan);
            user-select: none;
            /* スキャンラインエフェクト */
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px);
            z-index: 10;
        }

        /* 縦画面時の警告オーバーレイ（SP横画面専用制約） */
        #portrait-warning {
            display: none;
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
            #cockpit-wrapper { display: none !important; }
        }

        /* コックピットレイアウト */
        #cockpit-wrapper {
            display: grid;
            grid-template-rows: 15vh 60vh 25vh;
            grid-template-columns: 25vw 50vw 25vw;
            width: 100vw; height: 100vh;
            position: relative;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
            animation: bootUp 2s ease-out forwards;
        }

        @keyframes bootUp {
            0% { filter: brightness(0); transform: scale(0.95); }
            50% { filter: brightness(1.5) contrast(1.2); }
            100% { filter: brightness(1) contrast(1); transform: scale(1); }
        }

        /* パネル共通スタイル */
        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 243, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--ui-cyan); box-shadow: 0 0 10px var(--ui-cyan);
        }

        /* 上部HUD */
        #hud-top {
            grid-column: 1 / 4; grid-row: 1 / 2;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 10px 30px; border-bottom: none;
            clip-path: polygon(0 0, 100% 0, 100% 60%, 80% 100%, 20% 100%, 0 60%);
            background: linear-gradient(180deg, rgba(0,243,255,0.1) 0%, transparent 100%);
        }

        /* メインモニター（中央） */
        #main-monitor {
            grid-column: 2 / 3; grid-row: 2 / 3;
            margin: 0 10px;
            border: 2px solid var(--ui-cyan);
            box-shadow: 0 0 30px rgba(0,243,255,0.2);
            position: relative;
        }
        
        #main-video {
            width: 100%; height: 100%; object-fit: cover;
            transition: opacity 0.5s;
        }

        /* ターゲットUIオーバーレイ */
        .target-reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40vh; height: 40vh;
            border: 2px dashed rgba(0, 243, 255, 0.5);
            border-radius: 50%;
            animation: rotateTarget 10s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateTarget { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* サブモニター（左：機体ステータス画像） */
        #sub-monitor-left {
            grid-column: 1 / 2; grid-row: 2 / 3;
            margin-left: 10px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 20% 100%, 0 80%);
        }
        
        #sub-img-left {
            width: 100%; height: 100%; object-fit: cover;
            filter: hue-rotate(180deg) brightness(1.2) contrast(1.5);
            transition: all 0.5s;
        }

        /* サブモニター（右：レーダー＆データ） */
        #sub-monitor-right {
            grid-column: 3 / 4; grid-row: 2 / 3;
            margin-right: 10px;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
            padding: 15px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* コンソールパネル（下部：ボタン群） */
        #console-panel {
            grid-column: 1 / 4; grid-row: 3 / 4;
            display: flex; justify-content: space-around; align-items: center;
            background: linear-gradient(0deg, rgba(0,243,255,0.1) 0%, transparent 100%);
            border-top: 2px solid var(--ui-cyan);
            padding: 10px 50px;
        }

        /* アニメーションボタン */
        .cockpit-btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--ui-cyan);
            color: var(--ui-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; font-weight: bold;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .cockpit-btn:hover, .cockpit-btn.active {
            background: var(--ui-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--ui-cyan);
            transform: scale(1.05);
        }

        .cockpit-btn.danger { border-color: var(--ui-red); color: var(--ui-red); }
        .cockpit-btn.danger:hover, .cockpit-btn.danger.active {
            background: var(--ui-red); color: #fff; box-shadow: 0 0 20px var(--ui-red);
        }

        /* データスクロールアニメーション */
        .data-stream {
            font-size: 0.8rem; line-height: 1.2; height: 100px; overflow: hidden;
        }
        .data-stream span {
            display: block; animation: scrollData 2s linear infinite;
        }
        @keyframes scrollData {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="portrait-warning">
        <h2 style="font-family: 'Orbitron', sans-serif; color: var(--ui-red); font-size: 2rem; margin-bottom: 20px;">SYSTEM ALERT</h2>
        <p>PLEASE ROTATE YOUR DEVICE TO LANDSCAPE MODE.<br>コックピットモニターは横画面専用です。</p>
    </div>

    <div id="cockpit-wrapper">
        
        <div id="hud-top">
            <div style="font-size: 1.5rem; font-family: 'Orbitron'; font-weight: 900;">SYS_G-CON <span style="font-size: 0.8rem; color:#fff;">v1.0.5</span></div>
            <div style="text-align: right; color: var(--ui-orange);">
                ALERT STATUS: <span id="alert-status">NORMAL</span><br>
                <span style="font-size: 0.8rem;">COORDINATES: X:482.1 Y:901.4 Z:-12.8</span>
            </div>
        </div>

        <div id="sub-monitor-left" class="panel">
            <div style="position: absolute; top:10px; left:10px; background: rgba(0,0,0,0.8); padding: 5px;">TACTICAL MAP</div>
            <img id="sub-img-left" src="https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&w=3840&q=100" alt="Tactical Data">
        </div>

        <div id="main-monitor" class="panel">
            <video id="main-video" autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-galaxy-with-stars-in-the-universe-3171-large.mp4" type="video/mp4">
            </video>
            <div class="target-reticle" id="reticle"></div>
            <div style="position: absolute; bottom: 20px; left: 20px; font-size: 1.5rem; font-family: 'Orbitron'; text-shadow: 2px 2px #000;">
                MODE: <span id="mode-display" style="color:#fff;">CRUISE</span>
            </div>
        </div>

        <div id="sub-monitor-right" class="panel">
            <h3 style="border-bottom: 1px solid var(--ui-cyan); margin-bottom: 10px;">SYSTEM LOG</h3>
            <div class="data-stream" id="system-log">
                <span>> BOOTING G-CON OS...</span>
                <span>> ALL SYSTEMS GREEN.</span>
                <span>> MICROWAVE RECEIVER STABLE.</span>
                <span>> SCANNING AREA...</span>
            </div>
            <div style="margin-top: 20px; width: 100px; height: 100px; border: 2px solid var(--ui-cyan); border-radius: 50%; position: relative; margin-left: auto; margin-right: auto;">
                <div style="position: absolute; top:50%; left:50%; width:50%; height:2px; background:var(--ui-cyan); transform-origin: left; animation: rotateTarget 2s linear infinite;"></div>
            </div>
        </div>

        <div id="console-panel">
            <button class="cockpit-btn active" onclick="switchMode('cruise', this)">CRUISE MODE</button>
            <button class="cockpit-btn" onclick="switchMode('combat', this)">COMBAT MODE</button>
            <button class="cockpit-btn danger" onclick="switchMode('satellite', this)">SATELLITE CANNON</button>
        </div>
        
    </div>

    <script>
        // ボタン操作による各モニターの動的切り替え制御
        function switchMode(mode, btnElement) {
            // ボタンのアクティブ状態リセット
            const buttons = document.querySelectorAll('.cockpit-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // DOM要素の取得
            const video = document.getElementById('main-video');
            const subImg = document.getElementById('sub-img-left');
            const modeDisplay = document.getElementById('mode-display');
            const alertStatus = document.getElementById('alert-status');
            const reticle = document.getElementById('reticle');

            // トランジション用のフェードアウト
            video.style.opacity = 0;
            subImg.style.opacity = 0;

            setTimeout(() => {
                if (mode === 'cruise') {
                    // 通常巡航モード
                    video.src = "https://assets.mixkit.co/videos/preview/mixkit-galaxy-with-stars-in-the-universe-3171-large.mp4";
                    subImg.src = "https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&w=3840&q=100";
                    subImg.style.filter = "hue-rotate(180deg) brightness(1.2) contrast(1.5)";
                    modeDisplay.innerText = "CRUISE";
                    modeDisplay.style.color = "#fff";
                    alertStatus.innerText = "NORMAL";
                    alertStatus.style.color = "var(--ui-orange)";
                    reticle.style.borderColor = "rgba(0, 243, 255, 0.5)";
                    
                } else if (mode === 'combat') {
                    // 戦闘モード（高速移動/戦闘的な動画・画像へ切り替え）
                    video.src = "https://assets.mixkit.co/videos/preview/mixkit-entering-a-hyperspace-jump-in-outer-space-3162-large.mp4";
                    subImg.src = "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=3840&q=100";
                    subImg.style.filter = "hue-rotate(0deg) brightness(1.5) contrast(1.8)";
                    modeDisplay.innerText = "COMBAT";
                    modeDisplay.style.color = "var(--ui-orange)";
                    alertStatus.innerText = "ENGAGED";
                    alertStatus.style.color = "var(--ui-orange)";
                    reticle.style.borderColor = "var(--ui-orange)";

                } else if (mode === 'satellite') {
                    // サテライトキャノン発射モード（赤警告・エネルギー充填動画へ切り替え）
                    video.src = "https://assets.mixkit.co/videos/preview/mixkit-fire-flames-burning-in-slow-motion-4034-large.mp4";
                    subImg.src = "https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?auto=format&fit=crop&w=3840&q=100";
                    subImg.style.filter = "sepia(1) hue-rotate(-50deg) saturate(3) brightness(1.2)";
                    modeDisplay.innerText = "SATELLITE SYSTEM";
                    modeDisplay.style.color = "var(--ui-red)";
                    alertStatus.innerText = "DANGER / CHARGING";
                    alertStatus.style.color = "var(--ui-red)";
                    reticle.style.borderColor = "var(--ui-red)";
                }

                // フェードイン
                video.style.opacity = 1;
                subImg.style.opacity = 1;
            }, 500); // フェードアウトの時間に合わせて切り替え
        }
    </script>
</body>
</html>
